name: Pipeline CI Pytest
run-name: Mudança feita por -> ${{ github.actor }}

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test-suite:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: [3.11, 3.12, 3.13, 3.14]
        
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v3
              with:
                enable-cache: true
                version: "latest"

            - name: Python config
              run: uv python install ${{ matrix.python-version }}

            - name: Install dependencies
              run: uv sync --frozen

            - name: Run tests
              run: uv run pytest